<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/europaservice-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <style>
      html,
      body,
      #root,
      .app-shell {
        width: 100% !important;
        min-width: 0 !important;
        max-width: none !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      body {
        overflow-x: hidden !important;
      }

      #root,
      .app-shell,
      .app-shell > main {
        display: block !important;
        inline-size: 100% !important;
        max-inline-size: none !important;
      }

      @media (min-width: 561px) and (max-width: 1400px) {
        .site-header,
        .app-shell > main,
        .premium-hero,
        .premium-section,
        .premium-image-split,
        .premium-case-split,
        .premium-contact-layout,
        .premium-final-cta,
        .public-footer {
          width: 100% !important;
          min-width: 0 !important;
          max-width: none !important;
          inline-size: 100% !important;
          max-inline-size: none !important;
          margin-left: 0 !important;
          margin-right: 0 !important;
        }

        .premium-hero-copy,
        .premium-section-heading,
        .premium-service-grid,
        .premium-project-grid,
        .premium-feature-grid,
        .premium-value-grid,
        .premium-testimonial-grid,
        .premium-contact-grid,
        .premium-gallery,
        .premium-stats,
        .premium-process,
        .premium-key-facts,
        .premium-featured-project,
        .premium-filter-pills,
        .premium-logo-row,
        .premium-sector-row,
        .premium-timeline,
        .premium-faq {
          width: min(100%, 1180px) !important;
          max-width: 1180px !important;
          margin-left: auto !important;
          margin-right: auto !important;
        }
      }
    </style>
    <title>EuropaService Hub</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
